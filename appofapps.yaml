apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: git@bitbucket.org:metascan/metadefender-k8s.git
    targetRevision: MDK8S-237-argocd
    directory:
      recurse: true
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
 