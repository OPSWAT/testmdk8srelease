apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mdcore
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://opswat.github.io/metadefender-k8s
      targetRevision: MDK8S-237-argocd
      path: helm_charts/mdcore
      helm:
        releaseName: mdcore
        valueFiles:
          - "$values/payoneer/values-dev.yaml"
    - ref: values
      repoURL: git@bitbucket.org:metascan/metadefender-k8s.git
      targetRevision: MDK8S-237-argocd
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  syncPolicy:
    automated: {}          
